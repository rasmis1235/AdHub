name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-frontend.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AD_MODE: ${{ secrets.VITE_AD_MODE }}
          VITE_ADSTERRA_KEY: ${{ secrets.VITE_ADSTERRA_KEY }}
          VITE_POPADS_ID: ${{ secrets.VITE_POPADS_ID }}
          VITE_HILLTOPADS_ID: ${{ secrets.VITE_HILLTOPADS_ID }}
        run: npm run build

      - name: Fix SPA routing (copy index.html → 404.html)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          cname: rasmis1235.tech
