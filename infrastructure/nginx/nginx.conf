user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/x-javascript;

    # Security Headers (applied globally)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream backend pool
    upstream adhub_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        # Add more servers for horizontal scaling:
        # server backend2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name adhub.in www.adhub.in api.adhub.in;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name adhub.in www.adhub.in;

        ssl_certificate /etc/nginx/ssl/adhub.in.crt;
        ssl_certificate_key /etc/nginx/ssl/adhub.in.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        root /usr/share/nginx/html;
        index index.html;

        # Client body size (for file uploads)
        client_max_body_size 10m;

        # Connection limit
        limit_conn conn_limit 20;

        # React SPA
        location / {
            try_files $uri $uri/ /index.html;
            limit_req zone=general burst=20 nodelay;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Block known bad bots
        if ($http_user_agent ~* (scrapy|python-requests|java|perl|curl|wget|libwww)) {
            return 403;
        }
    }

    # API server
    server {
        listen 443 ssl http2;
        server_name api.adhub.in;

        ssl_certificate /etc/nginx/ssl/api.adhub.in.crt;
        ssl_certificate_key /etc/nginx/ssl/api.adhub.in.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 10m;
        limit_conn conn_limit 30;

        # Health check (no rate limit)
        location = /health {
            proxy_pass http://adhub_backend;
            proxy_http_version 1.1;
            access_log off;
        }

        # Auth endpoints (strict rate limit)
        location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://adhub_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://adhub_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # No caching for API
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Block unauthorized routes
        location / {
            return 404;
        }
    }
}
